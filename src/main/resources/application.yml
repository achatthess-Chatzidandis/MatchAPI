spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/matchdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    show-sql: true

  sql:
    init:
      mode: always

logging:
  level:
    root: INFO
    chatzidandis: DEBUG